services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: usaecommerce-backend-app
    container_name: usaecommerce-backend-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost:8080}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-usaecommerce}
      DB_USERNAME: ${DB_USERNAME:-usaecommerce}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    depends_on:
      - db

  web:
    image: nginx:1.27-alpine
    container_name: usaecommerce-backend-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8.4
    container_name: usaecommerce-backend-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ${DB_DATABASE:-usaecommerce}
      MYSQL_USER: ${DB_USERNAME:-usaecommerce}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db-data:/var/lib/mysql

volumes:
  db-data:

